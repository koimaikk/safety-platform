<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者ページ | 新規入場者アンケート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--sur:#161b22;--card:#1c2128;--bor:#30363d;
  --or:#FF6B00;--ye:#FFD600;--grn:#22C55E;--red:#EF4444;--blu:#3B82F6;
  --txt:#e6edf3;--sub:#7d8590;--wht:#f0f6fc;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;}

/* ─── ログイン画面 ─── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
#login-screen.hidden{display:none;}
.login-box{background:var(--card);border:1px solid var(--bor);border-radius:16px;padding:40px 32px;width:100%;max-width:360px;text-align:center;}
.login-logo{font-family:'Oswald',sans-serif;font-size:28px;color:var(--or);font-weight:700;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--sub);margin-bottom:24px;}
.login-field{width:100%;background:var(--bg);border:1px solid var(--bor);border-radius:8px;padding:12px 16px;color:var(--txt);font-size:16px;font-family:inherit;margin-bottom:10px;}
.login-field:focus{outline:none;border-color:var(--or);}
.login-btn{width:100%;background:var(--or);color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px;}
.login-err{color:var(--red);font-size:12px;margin-top:6px;display:none;}

/* ─── メイン画面 ─── */
#admin-screen{display:none;}
#admin-screen.active{display:block;}
header{background:var(--sur);border-bottom:1px solid var(--bor);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;}
.hd-logo{font-family:'Oswald',sans-serif;font-size:18px;color:var(--or);font-weight:700;}
.hd-title{font-size:13px;color:var(--sub);flex:1;}
.hd-logout{background:none;border:1px solid var(--bor);color:var(--sub);border-radius:4px;padding:5px 10px;font-size:11px;font-family:inherit;cursor:pointer;}

/* ─── タブ ─── */
.tab-nav{display:flex;background:var(--sur);border-bottom:2px solid var(--bor);overflow-x:auto;}
.tab-btn{flex:1;padding:12px 8px;background:none;border:none;color:var(--sub);font-size:12px;font-family:inherit;font-weight:700;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.2s;margin-bottom:-2px;min-width:80px;}
.tab-btn.active{color:var(--or);border-bottom-color:var(--or);}

/* ─── コンテンツ ─── */
.tab-content{display:none;padding:12px 16px;max-width:900px;margin:0 auto;}
.tab-content.active{display:block;}

/* ─── カード/セクション ─── */
.card{background:var(--card);border:1px solid var(--bor);border-radius:8px;margin-bottom:12px;overflow:hidden;}
.card-hd{background:var(--sur);padding:10px 14px;font-size:12px;font-weight:700;color:var(--or);display:flex;align-items:center;gap:8px;}
.card-hd .badge{background:var(--or);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:auto;}
.card-body{padding:14px;}

/* ─── テーブル ─── */
.resp-table{width:100%;border-collapse:collapse;font-size:13px;}
.resp-table th{background:var(--sur);padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--sub);border-bottom:1px solid var(--bor);white-space:nowrap;}
.resp-table td{padding:9px 10px;border-bottom:1px solid var(--bor);vertical-align:top;}
.resp-table tr:last-child td{border-bottom:none;}
.resp-table tr:hover td{background:rgba(255,107,0,.04);}

/* ─── バッジ ─── */
.badge-new{background:rgba(255,107,0,.2);color:var(--or);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}
.badge-ok{background:rgba(34,197,94,.2);color:var(--grn);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}
.badge-ng{background:rgba(239,68,68,.2);color:var(--red);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}

/* ─── フォーム ─── */
.form-row{margin-bottom:10px;}
.form-row label{display:block;font-size:11px;color:var(--sub);font-weight:700;margin-bottom:4px;}
.inp{width:100%;background:var(--bg);border:1px solid var(--bor);border-radius:6px;padding:8px 10px;color:var(--txt);font-size:13px;font-family:inherit;}
.inp:focus{outline:none;border-color:var(--or);}
textarea.inp{resize:vertical;min-height:60px;}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ─── ボタン ─── */
.btn{padding:8px 14px;border-radius:6px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:.2s;}
.btn-or{background:var(--or);color:#fff;}
.btn-or:hover{background:#e55a00;}
.btn-grn{background:var(--grn);color:#fff;}
.btn-grn:hover{background:#16a34a;}
.btn-red{background:rgba(239,68,68,.15);color:var(--red);border:1px solid var(--red);}
.btn-out{background:none;border:1px solid var(--bor);color:var(--sub);}
.btn-out:hover{border-color:var(--or);color:var(--or);}
.btn-sm{padding:4px 10px;font-size:11px;}

/* ─── 統計 ─── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.stat-box{background:var(--card);border:1px solid var(--bor);border-radius:8px;padding:12px;text-align:center;}
.stat-num{font-size:28px;font-weight:900;font-family:'Oswald',sans-serif;}
.stat-lbl{font-size:10px;color:var(--sub);margin-top:2px;}

/* ─── モーダル ─── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:16px;}
.modal-ov.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--bor);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-hd{padding:14px 16px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);}
.modal-hd h3{font-size:14px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;}
.modal-body{padding:16px;}
.detail-row{display:flex;border-bottom:1px solid var(--bor);padding:8px 0;font-size:13px;}
.detail-lbl{min-width:120px;color:var(--sub);font-size:12px;flex-shrink:0;}
.detail-val{flex:1;word-break:break-all;}
.sig-img{max-width:280px;border:1px solid var(--bor);border-radius:4px;background:#fff;}

/* ─── 検索・フィルター ─── */
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.filter-row input,.filter-row select{background:var(--card);border:1px solid var(--bor);border-radius:6px;padding:8px 10px;color:var(--txt);font-size:12px;font-family:inherit;}
.filter-row input{flex:1;min-width:120px;}

/* ─── 空状態 ─── */
.empty{text-align:center;padding:40px 20px;color:var(--sub);}
.empty-icon{font-size:40px;margin-bottom:8px;}

/* ─── 資格カテゴリ ─── */
.qual-cat-hd{font-size:11px;font-weight:700;color:var(--sub);margin:10px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--bor);}

/* ─── トースト ─── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;opacity:0;transition:.3s;z-index:300;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">SAFETY ADMIN</div>
    <div class="login-sub">新規入場者アンケート 管理者ページ</div>
    <input type="password" class="login-field" id="login-pw" placeholder="パスワードを入力">
    <button class="login-btn" id="login-btn">ログイン</button>
    <div class="login-err" id="login-err">パスワードが正しくありません</div>
  </div>
</div>

<!-- 管理者画面 -->
<div id="admin-screen">
  <header>
    <div class="hd-logo">🔒 ADMIN</div>
    <div class="hd-title">新規入場者アンケート 管理者ページ</div>
    <button class="hd-logout" id="btn-logout">ログアウト</button>
  </header>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="responses">📋 回答一覧</button>
    <button class="tab-btn" data-tab="projects">🏗 工事管理</button>
    <button class="tab-btn" data-tab="companies">🏢 会社管理</button>
    <button class="tab-btn" data-tab="quals">🏅 資格管理</button>
    <button class="tab-btn" data-tab="settings">⚙ 設定</button>
  </div>

  <!-- ── 回答一覧タブ ── -->
  <div class="tab-content active" id="tab-responses">
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num" id="stat-total" style="color:var(--or)">0</div><div class="stat-lbl">総回答数</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-today" style="color:var(--blu)">0</div><div class="stat-lbl">本日の回答</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-new" style="color:var(--ye)">0</div><div class="stat-lbl">未確認</div></div>
    </div>
    <div class="filter-row">
      <input type="text" id="f-search" placeholder="🔍 氏名・会社名で検索" oninput="renderResponses()">
      <select id="f-proj-filter" onchange="renderResponses()">
        <option value="">全工事</option>
      </select>
      <select id="f-status-filter" onchange="renderResponses()">
        <option value="">全ステータス</option>
        <option value="新規">新規</option>
        <option value="確認済">確認済</option>
        <option value="要確認">要確認</option>
      </select>
      <button class="btn btn-out btn-sm" onclick="exportCSV()">⬇ CSV</button>
    </div>
    <div class="card">
      <div class="card-body" style="padding:0;">
        <div id="resp-list"></div>
      </div>
    </div>
  </div>

  <!-- ── 工事管理タブ ── -->
  <div class="tab-content" id="tab-projects">
    <div class="card">
      <div class="card-hd">➕ 新規工事登録</div>
      <div class="card-body">
        <div class="inp-row">
          <div class="form-row">
            <label>工事件名 *</label>
            <input type="text" class="inp" id="np-name" placeholder="〇〇工事">
          </div>
          <div class="form-row">
            <label>発注者</label>
            <input type="text" class="inp" id="np-client" placeholder="〇〇市">
          </div>
        </div>
        <div class="form-row">
          <label>現場住所</label>
          <input type="text" class="inp" id="np-addr" placeholder="大阪府〇〇市〇〇">
        </div>
        <div class="inp-row">
          <div class="form-row">
            <label>工期（開始）</label>
            <input type="date" class="inp" id="np-period-s">
          </div>
          <div class="form-row">
            <label>工期（終了）</label>
            <input type="date" class="inp" id="np-period-e">
          </div>
        </div>
        <button class="btn btn-or" onclick="addProject()">登録する</button>
      </div>
    </div>
    <div class="card">
      <div class="card-hd">工事一覧 <span class="badge" id="proj-badge">0件</span></div>
      <div class="card-body" style="padding:0;">
        <div id="proj-list"></div>
      </div>
    </div>
  </div>

  <!-- ── 会社管理タブ ── -->
  <div class="tab-content" id="tab-companies">
    <div class="card">
      <div class="card-hd">➕ 新規会社登録</div>
      <div class="card-body">
        <div class="inp-row">
          <div class="form-row">
            <label>会社名 *</label>
            <input type="text" class="inp" id="nc-name" placeholder="〇〇建設株式会社">
          </div>
          <div class="form-row">
            <label>電話番号</label>
            <input type="tel" class="inp" id="nc-phone" placeholder="06-1234-5678">
          </div>
        </div>
        <div class="form-row">
          <label>住所</label>
          <input type="text" class="inp" id="nc-addr" placeholder="大阪府〇〇市">
        </div>
        <button class="btn btn-or" onclick="addCompany()">登録する</button>
      </div>
    </div>
    <div class="card">
      <div class="card-hd">会社一覧 <span class="badge" id="comp-badge">0件</span></div>
      <div class="card-body" style="padding:0;">
        <div id="comp-list"></div>
      </div>
    </div>
  </div>

  <!-- ── 資格管理タブ ── -->
  <div class="tab-content" id="tab-quals">
    <div class="card">
      <div class="card-hd">➕ 新規資格登録</div>
      <div class="card-body">
        <div class="inp-row">
          <div class="form-row">
            <label>カテゴリ *</label>
            <input type="text" class="inp" id="nq-cat" placeholder="例：運転免許">
          </div>
          <div class="form-row">
            <label>資格名 *</label>
            <input type="text" class="inp" id="nq-name" placeholder="例：普通自動車免許">
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button class="btn btn-or" onclick="addQual()">登録する</button>
          <button class="btn btn-out" onclick="loadPresets()">プリセットを読み込む</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd">資格一覧 <span class="badge" id="qual-badge">0件</span></div>
      <div class="card-body" style="padding:0;">
        <div id="qual-list-admin"></div>
      </div>
    </div>
  </div>

  <!-- ── 設定タブ ── -->
  <div class="tab-content" id="tab-settings">
    <div class="card">
      <div class="card-hd">🔑 セキュリティ設定</div>
      <div class="card-body">
        <div class="form-row">
          <label>現在のパスワード</label>
          <input type="password" class="inp" id="s-pw-cur" placeholder="現在のパスワード">
        </div>
        <div class="form-row">
          <label>新しいパスワード（4文字以上）</label>
          <input type="password" class="inp" id="s-pw-new" placeholder="新しいパスワード">
        </div>
        <div class="form-row">
          <label>新しいパスワード（確認）</label>
          <input type="password" class="inp" id="s-pw-confirm" placeholder="もう一度入力">
        </div>
        <button class="btn btn-or" onclick="changePassword()">パスワードを変更する</button>
      </div>
    </div>
    <div class="card">
      <div class="card-hd">📤 GAS連携設定</div>
      <div class="card-body">
        <div class="form-row">
          <label>Google Apps Script URL</label>
          <input type="url" class="inp" id="s-gas-url" placeholder="https://script.google.com/macros/s/...">
        </div>
        <button class="btn btn-or" onclick="saveGasUrl()">保存する</button>
        <p style="font-size:11px;color:var(--sub);margin-top:8px;">GAS URLを設定すると、アンケート提出時にスプレッドシートへ自動送信されます。</p>
      </div>
    </div>
    <div class="card">
      <div class="card-hd">💾 データ管理</div>
      <div class="card-body">
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-out" onclick="backupData()">⬇ バックアップ</button>
          <label class="btn btn-out" style="cursor:pointer;">
            ⬆ 復元
            <input type="file" accept=".json" onchange="restoreData(this)" style="display:none;">
          </label>
          <button class="btn btn-red" onclick="clearAllData()">🗑 全データ削除</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 回答詳細モーダル -->
<div class="modal-ov" id="modal-detail">
  <div class="modal">
    <div class="modal-hd">
      <h3>📋 回答詳細</h3>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>
    <div class="modal-body" id="modal-detail-body"></div>
    <div style="padding:12px 16px;border-top:1px solid var(--bor);display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-grn btn-sm" id="btn-mark-ok">✅ 確認済にする</button>
      <button class="btn btn-out btn-sm" id="btn-mark-ng">⚠ 要確認にする</button>
      <button class="btn btn-out btn-sm" id="btn-print">🖨 帳票印刷</button>
      <button class="btn btn-red btn-sm" id="btn-delete-resp">削除</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ══════════════════════════════════════════════════
// 定数・設定
// ══════════════════════════════════════════════════
var SK = {
  proj: 'anketo_proj',
  comp: 'anketo_comp',
  quals: 'anketo_quals',
  settings: 'anketo_settings',
  responses: 'anketo_responses',
  pw: 'anketo_pw',
  session: 'anketo_admin_session'
};

var QUAL_PRESETS = [
  {category:'運転免許・車両系',name:'普通自動車免許（MT）'},
  {category:'運転免許・車両系',name:'普通自動車免許（AT限定）'},
  {category:'運転免許・車両系',name:'大型自動車免許'},
  {category:'運転免許・車両系',name:'中型自動車免許'},
  {category:'運転免許・車両系',name:'大型特殊自動車免許'},
  {category:'運転免許・車両系',name:'けん引免許'},
  {category:'建設機械・クレーン',name:'車両系建設機械運転技能講習（整地等）'},
  {category:'建設機械・クレーン',name:'車両系建設機械運転技能講習（解体）'},
  {category:'建設機械・クレーン',name:'小型車両系建設機械（3t未満）特別教育'},
  {category:'建設機械・クレーン',name:'移動式クレーン運転士免許'},
  {category:'建設機械・クレーン',name:'小型移動式クレーン運転技能講習（5t未満）'},
  {category:'建設機械・クレーン',name:'クレーン・デリック運転士免許'},

  {category:'電気・設備',name:'第一種電気工事士'},
  {category:'電気・設備',name:'第二種電気工事士'},
  {category:'電気・設備',name:'1級管工事施工管理技士'},
  {category:'電気・設備',name:'2級管工事施工管理技士'},
  {category:'施工管理',name:'1級土木施工管理技士'},
  {category:'施工管理',name:'2級土木施工管理技士'},
  {category:'施工管理',name:'1級建築施工管理技士'},
  {category:'施工管理',name:'2級建築施工管理技士'},
  {category:'施工管理',name:'一級建築士'},
  {category:'施工管理',name:'二級建築士'}
];

var currentRespId = null;

// ══════════════════════════════════════════════════
// 初期化
// ══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', function(){
  // ログイン処理
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('login-pw').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  document.getElementById('btn-logout').addEventListener('click', doLogout);
  document.getElementById('modal-close-btn').addEventListener('click', function(){ closeModal('modal-detail'); });

  // タブ切替
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
      document.querySelectorAll('.tab-content').forEach(function(c){ c.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('tab-'+tab).classList.add('active');
      if(tab==='responses') renderResponses();
      if(tab==='projects') renderProjects();
      if(tab==='companies') renderCompanies();
      if(tab==='quals') renderQuals();
      if(tab==='settings') loadSettings();
    });
  });

  // セッション確認
  if(sessionStorage.getItem(SK.session) === '1'){
    showAdmin();
  }

  // 初期プリセット読み込み
  if(getList(SK.quals).length === 0) loadPresets();
});

function doLogin(){
  var pw = document.getElementById('login-pw').value;
  var stored = localStorage.getItem(SK.pw) || 'admin1234';
  if(pw === stored){
    sessionStorage.setItem(SK.session, '1');
    document.getElementById('login-err').style.display = 'none';
    showAdmin();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('login-pw').value = '';
  }
}

function doLogout(){
  sessionStorage.removeItem(SK.session);
  document.getElementById('admin-screen').classList.remove('active');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-pw').value = '';
}

function showAdmin(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('admin-screen').classList.add('active');
  renderResponses();
  renderProjects();
  renderCompanies();
  renderQuals();
  loadSettings();
  updateProjFilter();
}

function getList(key){
  try{ return JSON.parse(localStorage.getItem(key)) || []; } catch(e){ return []; }
}
function saveList(key, list){
  localStorage.setItem(key, JSON.stringify(list));
}
function getSettings(){
  try{ return JSON.parse(localStorage.getItem(SK.settings)) || {}; } catch(e){ return {}; }
}
function saveSettings(s){
  localStorage.setItem(SK.settings, JSON.stringify(s));
}

function renderResponses(){
  var resps = getList(SK.responses);
  var search = (document.getElementById('f-search').value || '').toLowerCase();
  var projF = document.getElementById('f-proj-filter').value;
  var statF = document.getElementById('f-status-filter').value;

  var filtered = resps.filter(function(r){
    if(search && !((r.nameKanji||'').toLowerCase().includes(search)) && !((r.company||'').toLowerCase().includes(search))) return false;
    if(projF && r.projectName !== projF) return false;
    if(statF && r.status !== statF) return false;
    return true;
  });

  // 統計
  var today = new Date().toISOString().slice(0,10);
  document.getElementById('stat-total').textContent = resps.length;
  document.getElementById('stat-today').textContent = resps.filter(function(r){ return (r.submittedAt||'').startsWith(today); }).length;
  document.getElementById('stat-new').textContent = resps.filter(function(r){ return !r.status || r.status==='新規'; }).length;

  var el = document.getElementById('resp-list');
  if(filtered.length === 0){
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>回答がありません</div>';
    return;
  }

  var html = '<table class="resp-table"><thead><tr><th>提出日時</th><th>氏名</th><th>会社</th><th>工事</th><th>入場日</th><th>状態</th><th>操作</th></tr></thead><tbody>';
  filtered.forEach(function(r){
    var d = r.submittedAt ? new Date(r.submittedAt) : null;
    var dt = d ? (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0') : '―';
    var badge = r.status==='確認済' ? '<span class="badge-ok">確認済</span>' : r.status==='要確認' ? '<span class="badge-ng">要確認</span>' : '<span class="badge-new">新規</span>';
    html += '<tr>';
    html += '<td style="font-size:12px;white-space:nowrap;">'+dt+'</td>';
    html += '<td style="font-weight:700;">'+esc(r.nameKanji||'―')+'</td>';
    html += '<td style="font-size:12px;">'+esc(r.company||'―')+'</td>';
    html += '<td style="font-size:11px;color:var(--sub);">'+esc(r.projectName||'―')+'</td>';
    html += '<td style="font-size:12px;">'+esc(r.entryDate||'―')+'</td>';
    html += '<td>'+badge+'</td>';
    html += '<td><button class="btn btn-out btn-sm" onclick="viewResp(\''+esc(r.id)+'\')">詳細</button></td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

function exportCSV(){
  var resps = getList(SK.responses);
  if(resps.length===0){ showToast('回答データがありません'); return; }
  var cols = ['ID','提出日時','ステータス','工事件名','会社','職種','入場予定日','氏名','生年月日','年齢','性別','電話番号','体調','既往疾患','服薬','アレルギー','発熱','健康診断','建設業経験','現職経験','安全教育','保有資格'];
  var rows = [cols.join(',')];
  resps.forEach(function(r){
    rows.push([
      r.id, r.submittedAt, r.status||'新規', r.projectName, r.company, r.jobType, r.entryDate,
      r.nameKanji, r.birthdate, r.age, r.gender, r.phone, r.condition,
      r.disease+(r.diseases&&r.diseases.length?' : '+r.diseases.join('・'):''),
      r.medication, r.allergy, r.fever, r.healthCheck, r.expTotal, r.expCurrent,
      r.safetyEdu, (r.qualifications||[]).join('・')
    ].map(function(v){ return '"'+(v||'').toString().replace(/"/g,'""')+'"'; }).join(','));
  });
  var bom = new Uint8Array([0xEF,0xBB,0xBF]);
  var blob = new Blob([bom, rows.join('\n')], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'anketo_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  showToast('CSVをダウンロードしました');
}

function renderProjects(){

function changePassword(){
  var cur = document.getElementById('s-pw-cur').value;
  var nw = document.getElementById('s-pw-new').value;
  var cf = document.getElementById('s-pw-confirm').value;
  var stored = localStorage.getItem(SK.pw) || 'admin1234';
  if(cur !== stored){ showToast('現在のパスワードが違います'); return; }
  if(nw.length < 4){ showToast('4文字以上のパスワードを設定してください'); return; }
  if(nw !== cf){ showToast('新しいパスワードが一致しません'); return; }
  localStorage.setItem(SK.pw, nw);
  ['s-pw-cur','s-pw-new','s-pw-confirm'].forEach(function(id){ document.getElementById(id).value=''; });
  showToast('パスワードを変更しました');
}

function saveGasUrl(){
  var url = document.getElementById('s-gas-url').value.trim();
  var s = getSettings(); s.gasUrl = url; saveSettings(s);
  showToast('GAS URLを保存しました');
}

function backupData(){
  var data = {};
  [SK.proj, SK.comp, SK.quals, SK.settings, SK.responses].forEach(function(k){ data[k] = getList(k); });
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'anketo_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); showToast('バックアップをダウンロードしました');
}

function restoreData(input){
  var file = input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      if(!confirm('現在のデータを上書きして復元しますか？')) return;
      Object.keys(data).forEach(function(k){ localStorage.setItem(k, JSON.stringify(data[k])); });
      showToast('データを復元しました');
      showAdmin();
    } catch(err){ showToast('ファイルの読み込みに失敗しました'); }
  };
  reader.readAsText(file);
}

function clearAllData(){
  if(!confirm('全データを削除しますか？この操作は元に戻せません。')) return;
  if(!confirm('本当によろしいですか？')) return;
  [SK.proj, SK.comp, SK.quals, SK.settings, SK.responses].forEach(function(k){ localStorage.removeItem(k); });
  showToast('全データを削除しました');
  showAdmin();
}

// ══════════════════════════════════════════════════
// ユーティリティ
// ══════════════════════════════════════════════════
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function esc(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// モーダル背景クリックで閉じる
document.addEventListener('click', function(e){
  if(e.target.classList.contains('modal-ov')) e.target.classList.remove('open');
});
</script>
